# ============================================
# LogSage AI — Application Configuration
# ============================================

spring:
  application:
    name: LogSage-AI

  # PostgreSQL DataSource (Stage 3)
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5435}/logsage
    username: ${POSTGRES_USER:logsage}
    password: ${POSTGRES_PASSWORD:logsage}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 25          # raised from default 10 to handle log ingestion bursts
      connection-timeout: 10000      # 10s — fail fast instead of waiting 30s
      idle-timeout: 300000           # 5 min idle before connection is closed
      max-lifetime: 1200000          # 20 min max connection lifetime

  # JPA / Hibernate (Stage 3)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Wait for leader acknowledgment (good balance of safety + speed)
      acks: 1
    consumer:
      group-id: logsage-processors
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Start from earliest message if no committed offset exists
      auto-offset-reset: earliest
      # Stage 3: Disable auto-commit — required for retry/DLT to work.
      # With auto-commit, Kafka marks messages as consumed before processing
      # completes, so retries would never fire.
      enable-auto-commit: false

# Server Configuration
server:
  port: 8081

# AI / LLM Configuration
# Set AI_API_KEY before running: $env:AI_API_KEY = "sk-..."
ai:
  api:
    key: ${AI_API_KEY:}
    base-url: ${AI_API_BASE_URL:https://api.openai.com/v1}
    model: ${AI_API_MODEL:gpt-3.5-turbo}
    connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${AI_READ_TIMEOUT_MS:30000}
    max-response-size-bytes: ${AI_MAX_RESPONSE_SIZE:1048576}

# Rate Limiting (per IP, for /analyze endpoint)
rate-limit:
  requests-per-window: ${RATE_LIMIT_REQUESTS:10}
  window-ms: ${RATE_LIMIT_WINDOW_MS:60000}

# Logging (pattern is now fully managed by logback-spring.xml)
# Override the LogSage appender endpoint if needed:
logsage:
  appender:
    url: http://localhost:8081/api/logs

# Async request timeout for Spring MVC
spring.mvc.async.request-timeout: 35000
