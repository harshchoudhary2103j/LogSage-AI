# ============================================
# LogSage AI — Docker Compose (Kafka with KRaft)
# ============================================
# No Zookeeper needed — KRaft mode is Kafka's built-in consensus.
#
# Usage:
#   docker-compose up -d       (start)
#   docker-compose down        (stop)
#   docker-compose down -v     (stop + delete data)

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: logsage-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft settings (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Cluster
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # KRaft cluster ID (any fixed UUID)
      CLUSTER_ID: "LogSageAI-Kafka-Cluster-01"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: logsage-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: logsage-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092  # internal Docker network
    depends_on:
      - kafka